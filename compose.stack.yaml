services:
  nodelink:
    build:
      context: ../NodeLink
      dockerfile: Dockerfile
    environment:
      NODELINK_SERVER_HOST: 0.0.0.0
      NODELINK_SERVER_PORT: 2333
      NODELINK_SERVER_PASSWORD: ${NODELINK_PASSWORD:?NODELINK_PASSWORD is required}
    ports:
      - "2333:2333"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const net=require('node:net');const s=net.connect({host:'127.0.0.1',port:2333},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nodelink:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODELINK_HOST: nodelink
      NODELINK_PORT: 2333
      NODELINK_PASSWORD: ${NODELINK_PASSWORD:?NODELINK_PASSWORD is required}
      NODELINK_PATH_VERSION: ${NODELINK_PATH_VERSION:-v4}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const net=require('node:net');const s=net.connect({host:'127.0.0.1',port:3000},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped
