services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODELINK_HOST: ${BOT_NODELINK_HOST:-host.docker.internal}
      NODELINK_PORT: ${BOT_NODELINK_PORT:-2333}
      NODELINK_PATH_VERSION: ${BOT_NODELINK_PATH_VERSION:-v4}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const net=require('node:net');const s=net.connect({host:'127.0.0.1',port:3000},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

